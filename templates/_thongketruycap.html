<div class="sidebar mt-3">
    <div class="stat-card stat-today">
        <div class="icon"><i class="fas fa-calendar-day"></i></div>
        <div class="text">
            <span class="label">Lượt truy cập hôm nay</span>
            <span class="value">{{ thongketruycap["today"] }}</span>
        </div>
    </div>
    <div class="stat-card stat-week">
        <div class="icon"><i class="fas fa-calendar-week"></i></div>
        <div class="text">
            <span class="label">Lượt truy cập tuần này</span>
            <span class="value">{{ thongketruycap["week"] }}</span>
        </div>
    </div>
    <div class="stat-card stat-month">
        <div class="icon"><i class="fas fa-calendar-alt"></i></div>
        <div class="text">
            <span class="label">Lượt truy cập tháng này</span>
            <span class="value">{{ thongketruycap["month"] }}</span>
        </div>
    </div>
    <div class="stat-card stat-total">
        <div class="icon"><i class="fas fa-globe"></i></div>
        <div class="text">
            <span class="label">Lượt truy cập tổng cộng</span>
            <span class="value">{{ thongketruycap["total"] }}</span>
        </div>
    </div>
</div>
