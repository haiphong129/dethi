{% if request.path == '/links' %}
<div class="sidebar mb-3">
    <h4 class="mb-4">Tìm kiếm </h4>
    <form method="GET">

    <div class="input-group mb-4">

        <input
            type="text"
            name="q"
            class="form-control"
            placeholder="Tìm Link rút gọn..."
            value="{{ keyword }}"
        >

        <button class="btn btn-primary">

            Tìm kiếm

        </button>

    </div>

</form>
</div>
{% endif %}
