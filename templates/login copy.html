{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-1 rounded-3">
        <div class="card-body p-4">
          <h4 class="card-title mb-4 text-center">Đăng nhập</h4>
          <form method="post">
            <div class="mb-3">
              <label for="username" class="form-label">Tên đăng nhập</label>
              <input id="username" name="username" class="form-control" placeholder="Nhập tên đăng nhập">
            </div>
            <div class="mb-4">
              <label for="password" class="form-label">Mật khẩu</label>
              <input id="password" name="password" type="password" class="form-control" placeholder="Nhập mật khẩu">
            </div>
            <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
